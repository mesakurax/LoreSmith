spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/ainovel}
    username: ${SPRING_DATASOURCE_USERNAME:ainovel}
    password: ${SPRING_DATASOURCE_PASSWORD:ainovel}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
